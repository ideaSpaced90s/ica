<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#F48FB1" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#F48FB1" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#F48FB1" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#F48FB1" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#F48FB1" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Magician: 3D perspective rings and magical sparkles -->
    <g transform="translate(200, 200) rotate(-15)" fill="none" stroke="url(#primaryGrad)" stroke-width="3">
      <!-- Perspective Ellipses -->
      <ellipse cx="0" cy="0" rx="130" ry="40" stroke-opacity="0.4" filter="url(#glow)"/>
      <ellipse cx="0" cy="0" rx="100" ry="30" stroke-opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="70" ry="20" stroke-width="5"/>
    </g>
    <!-- Central floating diamond -->
    <polygon points="200,140 220,200 200,260 180,200" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <polygon points="200,165 210,200 200,235 190,200" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Magical sparkles -->
    <polygon points="120,150 125,160 135,160 127,167 130,177 120,170 110,177 113,167 105,160 115,160" fill="#FF80AB" filter="url(#glow)"/>
    <polygon points="280,230 283,237 290,237 285,242 287,249 280,244 273,249 275,242 270,237 277,237" fill="#FF80AB" filter="url(#glow)"/>
</svg>