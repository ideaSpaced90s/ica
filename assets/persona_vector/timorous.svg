<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#90CAF9" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#90CAF9" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#90CAF9" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#90CAF9" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#90CAF9" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Coward: Nested defensive shields -->
    <circle cx="200" cy="200" r="110" fill="none" stroke="url(#primaryGrad)" stroke-width="12" opacity="0.3"/>
    <circle cx="200" cy="200" r="85" fill="none" stroke="url(#primaryGrad)" stroke-width="8" opacity="0.5"/>
    <circle cx="200" cy="200" r="60" fill="none" stroke="url(#primaryGrad)" stroke-width="6" opacity="0.8"/>
    <!-- Small blue core protected inside -->
    <circle cx="200" cy="200" r="24" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <!-- Shield cross dividers -->
    <path d="M 200 60 L 200 140 M 200 260 L 200 340 M 60 200 L 140 200 M 260 200 L 340 200" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="3"/>
</svg>