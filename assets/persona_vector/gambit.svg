<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#BA68C8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BA68C8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#BA68C8" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#BA68C8" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#BA68C8" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#BA68C8" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#BA68C8" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Gambit: Overlapping abstract cube frameworks rotated -->
    <g stroke="url(#primaryGrad)" stroke-width="3" fill="none" filter="url(#glow)">
      <!-- Main Cube -->
      <g transform="translate(200, 200) rotate(15)">
        <rect x="-60" y="-60" width="120" height="120" rx="8" stroke-width="4"/>
        <line x1="-60" y1="-60" x2="60" y2="60"/>
        <line x1="60" y1="-60" x2="-60" y2="60"/>
        <circle cx="0" cy="0" r="45" stroke="#FFFFFF" stroke-opacity="0.3"/>
      </g>
      <!-- Sub-Cube rotated opposite -->
      <g transform="translate(200, 200) rotate(-30)" opacity="0.6">
        <rect x="-45" y="-45" width="90" height="90" rx="4"/>
        <circle cx="0" cy="0" r="30" stroke="url(#primaryGrad)"/>
      </g>
    </g>
    <!-- Glowing trickster spheres -->
    <circle cx="200" cy="200" r="16" fill="#E040FB" filter="url(#glow)"/>
    <circle cx="130" cy="130" r="10" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="270" cy="270" r="10" fill="#00E5FF" filter="url(#glow)"/>
</svg>