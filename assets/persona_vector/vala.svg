<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#4DB6AC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#4DB6AC" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#4DB6AC" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#4DB6AC" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#4DB6AC" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#4DB6AC" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Vala: Clean precision lines and alignment ticks -->
    <g stroke="url(#primaryGrad)" fill="none">
      <circle cx="200" cy="200" r="100" stroke-width="3"/>
      <circle cx="200" cy="200" r="70" stroke-width="1.5" stroke-dasharray="6,3"/>
      
      <!-- Alignment ticks -->
      <path d="M 200 40 L 200 70 M 200 330 L 200 360 M 40 200 L 70 200 M 330 200 L 360 200" stroke-width="3"/>
      <path d="M 90 90 L 110 110 M 290 90 L 270 110 M 90 290 L 110 270 M 290 290 L 270 270" stroke-dasharray="4,4"/>
    </g>
    <!-- Tactical cyan dots -->
    <circle cx="200" cy="200" r="16" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <circle cx="100" cy="200" r="6" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="300" cy="200" r="6" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="200" cy="100" r="6" fill="#00E5FF" filter="url(#glow)"/>
    <circle cx="200" cy="300" r="6" fill="#00E5FF" filter="url(#glow)"/>
</svg>