<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#7986CB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7986CB"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#7986CB" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#7986CB" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#7986CB" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#7986CB" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#7986CB" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Sentinel: Interlocking towers and defense shield grids -->
    <g fill="url(#primaryGrad)" opacity="0.9" filter="url(#glow)">
      <!-- Left pillar -->
      <rect x="130" y="150" width="35" height="150" rx="6"/>
      <!-- Right pillar -->
      <rect x="235" y="150" width="35" height="150" rx="6"/>
      <!-- Cross sentinel beam -->
      <rect x="110" y="190" width="180" height="30" rx="8" fill="#5C6BC0"/>
    </g>
    <!-- Central sentinel core -->
    <circle cx="200" cy="205" r="32" fill="#0A0D14" stroke="url(#primaryGrad)" stroke-width="3"/>
    <circle cx="200" cy="205" r="16" fill="#3D5AFE" filter="url(#glow)"/>
    <!-- Guard lines -->
    <line x1="147" y1="160" x2="147" y2="290" stroke="#0A0D14" stroke-width="2" opacity="0.5"/>
    <line x1="252" y1="160" x2="252" y2="290" stroke="#0A0D14" stroke-width="2" opacity="0.5"/>
</svg>