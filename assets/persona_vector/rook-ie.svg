<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#64B5F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#64B5F6" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#64B5F6" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#64B5F6" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#64B5F6" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#64B5F6" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Rookie: Minimalist modular castle tower -->
    <g fill="url(#primaryGrad)" filter="url(#glow)">
      <!-- Merlons -->
      <rect x="110" y="100" width="30" height="30" rx="4"/>
      <rect x="185" y="100" width="30" height="30" rx="4"/>
      <rect x="260" y="100" width="30" height="30" rx="4"/>
      <!-- Main Tower Base -->
      <path d="M 120 140 L 280 140 L 290 280 L 110 280 Z" fill-opacity="0.85"/>
    </g>
    <!-- Castle window slits -->
    <rect x="150" y="170" width="16" height="40" rx="8" fill="#0A0D14"/>
    <rect x="234" y="170" width="16" height="40" rx="8" fill="#0A0D14"/>
    <!-- Horizontal wall lines -->
    <line x1="110" y1="240" x2="290" y2="240" stroke="#0A0D14" stroke-width="4" opacity="0.3"/>
</svg>