<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#A5D6A7" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#A5D6A7" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#A5D6A7" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#A5D6A7" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#A5D6A7" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Alien: Digital code grids, circuit connections, and matrix nodes -->
    <g stroke="url(#primaryGrad)" stroke-width="2" fill="none" opacity="0.8">
      <!-- Circuit lines -->
      <path d="M 80 140 L 150 140 L 180 170 L 180 230 L 150 260 L 80 260"/>
      <path d="M 320 140 L 250 140 L 220 170 L 220 230 L 250 260 L 320 260"/>
      <path d="M 200 70 L 200 120 L 170 150 M 200 120 L 230 150"/>
      <path d="M 200 330 L 200 280 L 170 250 M 200 280 L 230 250"/>
    </g>
    <!-- Glowing processor/circuit chips -->
    <rect x="175" y="175" width="50" height="50" rx="10" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="12" fill="#0A0D14" stroke="#FFF" stroke-width="2"/>
    
    <!-- Nodes -->
    <circle cx="80" cy="140" r="6" fill="#FFF" filter="url(#glow)"/>
    <circle cx="80" cy="260" r="6" fill="#FFF" filter="url(#glow)"/>
    <circle cx="320" cy="140" r="6" fill="#FFF" filter="url(#glow)"/>
    <circle cx="320" cy="260" r="6" fill="#FFF" filter="url(#glow)"/>
    <circle cx="200" cy="70" r="6" fill="#00E676" filter="url(#glow)"/>
    <circle cx="200" cy="330" r="6" fill="#00E676" filter="url(#glow)"/>
</svg>