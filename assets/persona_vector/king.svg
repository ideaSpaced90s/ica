<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#E0E0E0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#E0E0E0" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#E0E0E0" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#E0E0E0" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#E0E0E0" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#E0E0E0" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- King: Apex cybernetic crown and geometric network -->
    <g transform="translate(200, 200)">
      <!-- Network connections -->
      <g stroke="#FFF" stroke-width="1.5" stroke-opacity="0.3" fill="none">
        <polygon points="0,-140 120,80 -120,80"/>
        <polygon points="0,140 120,-80 -120,-80" stroke-dasharray="3,3"/>
      </g>
      
      <!-- Monolithic Apex Crown -->
      <path d="M -90 70 L -100 -40 L -50 10 L 0 -90 L 50 10 L 100 -40 L 90 70 Z" fill="url(#primaryGrad)" filter="url(#glow)"/>
      <rect x="-80" y="78" width="160" height="14" rx="7" fill="url(#primaryGrad)"/>
      
      <!-- Apex gems -->
      <polygon points="-100,-55 -92,-40 -108,-40" fill="#FFF" filter="url(#glow)"/>
      <polygon points="0,-110 10,-90 -10,-90" fill="#FFF" filter="url(#glow)"/>
      <polygon points="100,-55 108,-40 92,-40" fill="#FFF" filter="url(#glow)"/>
      
      <!-- Core digital node -->
      <circle cx="0" cy="25" r="24" fill="#0A0D14" stroke="#FFF" stroke-width="2"/>
      <circle cx="0" cy="25" r="12" fill="#00E5FF" filter="url(#glow)"/>
    </g>
</svg>