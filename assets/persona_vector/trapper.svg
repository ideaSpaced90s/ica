<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#CE93D8" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#CE93D8" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#CE93D8" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#CE93D8" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#CE93D8" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Trapper: Precise geometric concentric web and target -->
    <g transform="translate(200, 200)" stroke="url(#primaryGrad)" stroke-width="1.5" fill="none">
      <!-- Web rings -->
      <polygon points="0,-120 85,-85 120,0 85,85 0,120 -85,85 -120,0 -85,-85" stroke-opacity="0.3"/>
      <polygon points="0,-90 64,-64 90,0 64,64 0,90 -64,64 -90,0 -64,-64" stroke-opacity="0.5"/>
      <polygon points="0,-60 42,-42 60,0 42,42 0,60 -42,42 -60,0 -42,-42" stroke-opacity="0.8"/>
      <polygon points="0,-30 21,-21 30,0 21,21 0,30 -21,21 -30,0 -21,-21"/>
      
      <!-- Radial web spokes -->
      <line x1="0" y1="-140" x2="0" y2="140" stroke-opacity="0.5"/>
      <line x1="-140" y1="0" x2="140" y2="0" stroke-opacity="0.5"/>
      <line x1="-100" y1="-100" x2="100" y2="100" stroke-dasharray="4,4"/>
      <line x1="100" y1="-100" x2="-100" y2="100" stroke-dasharray="4,4"/>
      
      <!-- The Trap (glowing central node) -->
      <circle cx="0" cy="0" r="12" fill="#E040FB" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="6" fill="#FFF"/>
    </g>
</svg>