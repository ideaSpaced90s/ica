<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#81C784" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#81C784" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#81C784" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#81C784" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#81C784" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#81C784" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Pawnzy: Stairway and a giant stylized Pawn -->
    <path d="M 100 280 L 140 280 L 140 240 L 180 240 L 180 200 L 220 200 L 220 240 L 260 240 L 260 280 L 300 280" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Stylized Pawn -->
    <g transform="translate(175, 110)">
      <!-- Head -->
      <circle cx="25" cy="25" r="18" fill="url(#primaryGrad)" filter="url(#glow)"/>
      <!-- Collar -->
      <rect x="10" y="48" width="30" height="6" rx="3" fill="url(#primaryGrad)"/>
      <!-- Body -->
      <path d="M 12 56 L 5 90 L 45 90 L 38 56 Z" fill="url(#primaryGrad)"/>
    </g>
    <!-- Small star representing hope -->
    <polygon points="200,50 205,65 220,65 208,75 212,90 200,80 188,90 192,75 180,65 195,65" fill="#FFD54F" filter="url(#glow)"/>
</svg>