<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#FFD54F" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#FFD54F" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FFD54F" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#FFD54F" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#FFD54F" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Titan: Monolith obelisk and orbiting rings -->
    <g transform="translate(200, 200)">
      <!-- Monolith (Center Pillar) -->
      <polygon points="-24,90 24,90 14,-90 -14,-90" fill="url(#primaryGrad)" filter="url(#glow)"/>
      <polygon points="-12,80 12,80 6,-80 -6,-80" fill="#FFF" opacity="0.4"/>
      
      <!-- Orbiting Rings -->
      <g stroke="url(#primaryGrad)" stroke-width="3" fill="none">
        <ellipse cx="0" cy="10" rx="140" ry="32" transform="rotate(-20)" stroke-opacity="0.3"/>
        <ellipse cx="0" cy="-10" rx="120" ry="24" transform="rotate(35)" stroke-opacity="0.5"/>
        <ellipse cx="0" cy="0" rx="100" ry="16" transform="rotate(-5)" stroke-opacity="0.8"/>
      </g>
      <!-- Crown gem of Titan -->
      <polygon points="0,-115 8,-100 0,-85 -8,-100" fill="#FFF" filter="url(#glow)"/>
    </g>
</svg>