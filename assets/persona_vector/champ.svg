<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#FFE082" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#FFE082" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FFE082" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#FFE082" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#FFE082" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Champ: Star crown and radiant circular rays -->
    <g transform="translate(200, 200)" filter="url(#glow)">
      <!-- Radiant Rays -->
      <g stroke="url(#primaryGrad)" stroke-width="2" opacity="0.3">
        <line x1="-150" y1="0" x2="150" y2="0"/>
        <line x1="0" y1="-150" x2="0" y2="150"/>
        <line x1="-105" y1="-105" x2="105" y2="105"/>
        <line x1="105" y1="-105" x2="-105" y2="105"/>
      </g>
      
      <!-- Styled Champion Crown -->
      <path d="M -80 60 L -90 -20 L -40 20 L 0 -50 L 40 20 L 90 -20 L 80 60 Z" fill="url(#primaryGrad)"/>
      <rect x="-70" y="66" width="140" height="12" rx="4" fill="url(#primaryGrad)"/>
      <!-- Glowing jewels -->
      <circle cx="-90" cy="-25" r="8" fill="#FFF" filter="url(#glow)"/>
      <circle cx="0" cy="-55" r="10" fill="#FFF" filter="url(#glow)"/>
      <circle cx="90" cy="-25" r="8" fill="#FFF" filter="url(#glow)"/>
    </g>
    <circle cx="200" cy="220" r="24" fill="#FFF" opacity="0.2"/>
</svg>