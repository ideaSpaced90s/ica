<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#90A4AE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#90A4AE" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#90A4AE" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#90A4AE" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#90A4AE" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#90A4AE" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Molly: Nested rounded safe squares with a closed core -->
    <g fill="none" stroke="url(#primaryGrad)" stroke-linejoin="round">
      <rect x="90" y="90" width="220" height="220" rx="40" stroke-width="12" opacity="0.4"/>
      <rect x="125" y="125" width="150" height="150" rx="30" stroke-width="8" opacity="0.7"/>
      <rect x="155" y="155" width="90" height="90" rx="20" stroke-width="5"/>
    </g>
    <!-- Lock vault center dial -->
    <circle cx="200" cy="200" r="20" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="8" fill="#FFFFFF"/>
    <!-- Shield pins -->
    <circle cx="110" cy="110" r="6" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="290" cy="110" r="6" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="110" cy="290" r="6" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="290" cy="290" r="6" fill="#FFFFFF" opacity="0.8"/>
</svg>