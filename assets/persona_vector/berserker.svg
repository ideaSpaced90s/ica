<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0D14" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  <rect width="400" height="400" fill="none" stroke="#FFCC80" stroke-opacity="0.15" stroke-width="2"/>
  
  <!-- Subtle circular grid -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#FFCC80" stroke-opacity="0.04" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FFCC80" stroke-opacity="0.06" stroke-width="1.5" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#FFCC80" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 50 200 L 350 200 M 200 50 L 200 350" fill="none" stroke="#FFCC80" stroke-opacity="0.04" stroke-width="1.5"/>

  <!-- Persona Specific Abstract Art -->
  <!-- Berserker: Aggressive exploding spikes and fire shapes -->
    <g transform="translate(200, 200)" filter="url(#glow)">
      <!-- Sharp outer flame spikes -->
      <path d="M 0 0 L -40 -160 L -15 -60 L 0 0 Z" fill="url(#primaryGrad)"/>
      <path d="M 0 0 L 80 -140 L 40 -40 L 0 0 Z" fill="url(#primaryGrad)" opacity="0.8"/>
      <path d="M 0 0 L 150 -40 L 50 -10 L 0 0 Z" fill="url(#primaryGrad)"/>
      <path d="M 0 0 L 110 110 L 40 40 L 0 0 Z" fill="url(#primaryGrad)" opacity="0.9"/>
      <path d="M 0 0 L -20 150 L -10 50 L 0 0 Z" fill="url(#primaryGrad)"/>
      <path d="M 0 0 L -130 80 L -50 20 L 0 0 Z" fill="url(#primaryGrad)" opacity="0.8"/>
      <path d="M 0 0 L -140 -60 L -50 -20 L 0 0 Z" fill="url(#primaryGrad)"/>
      <!-- Fiery glowing center -->
      <circle cx="0" cy="0" r="40" fill="#FF5722"/>
      <circle cx="0" cy="0" r="20" fill="#FFD54F" filter="url(#glow)"/>
    </g>
</svg>